<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Orbital Transfer - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="orbital-transfer"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Orbital Transfer</h1>
    <p class="sub">A Hohmann transfer touches both circular orbits with one ellipse. Vary the target orbit and watch delta-v change. <strong>Canvas 2D</strong> · orbital mechanics.</p>
    <div class="stage" aria-label="Hohmann orbital transfer ellipse between two circular orbits"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Target orbit</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Progress</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="1.0" /></label><button id="step">Advance</button><button id="shuffle">Restart</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
