<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flow Field — Kevin Arifin</title>
    <link rel="stylesheet" href="../lib/sim.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  </head>
  <body>
    <main class="sim">
      <a class="back" href="/sims/">← Sims</a>
      <h1>Flow Field</h1>
      <p class="sub">Particles drift along a Perlin-noise vector field. <strong>p5.js</strong> — the fastest path for generative sketches.</p>

      <div class="stage" id="stage" aria-label="Particles following a Perlin-noise vector field"></div>
      <div class="controls">
        <label class="row"><span>Noise scale <strong id="scaleValue">0.004</strong></span>
          <input id="scale" type="range" min="0.001" max="0.012" step="0.001" value="0.004" /></label>
        <button id="toggle">Pause</button>
        <button id="reset">Reset</button>
      </div>
      <div class="readout" id="ro" aria-live="polite">Particles: 900 · noise scale 0.004</div>

      <script>
        let particles = [], noiseScale = 0.004, W, H, running = true;
        const N = 900;
        const stage = () => document.getElementById("stage");
        const seed = () => ({ x: Math.random() * W, y: Math.random() * H });
        const ro = () => document.getElementById("ro");
        const toggleButton = () => document.getElementById("toggle");
        function updateReadout() { ro().innerHTML = "Particles: <strong>" + N + "</strong> · noise scale <strong>" + noiseScale.toFixed(3) + "</strong>"; }
        function setRunning(next) {
          running = next;
          toggleButton().textContent = running ? "Pause" : "Play";
          running ? loop() : noLoop();
        }

        function setup() {
          W = stage().clientWidth; H = stage().clientHeight;
          const c = createCanvas(W, H); c.parent(stage());
          pixelDensity(Math.min(displayDensity(), 2));
          background(14);
          for (let i = 0; i < N; i++) particles.push(seed());
          document.getElementById("scale").addEventListener("input", (e) => {
            noiseScale = +e.target.value;
            document.getElementById("scaleValue").textContent = noiseScale.toFixed(3);
            updateReadout();
          });
          document.getElementById("toggle").addEventListener("click", () => setRunning(!running));
          document.getElementById("reset").addEventListener("click", () => { background(14); particles = Array.from({ length: N }, seed); updateReadout(); });
          document.addEventListener("visibilitychange", () => { if (document.hidden) noLoop(); else if (running) loop(); });
          if ("IntersectionObserver" in window) {
            new IntersectionObserver((entries) => { if (!entries[0].isIntersecting) noLoop(); else if (running) loop(); }).observe(stage());
          }
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) setRunning(false);
          updateReadout();
        }
        function draw() {
          noStroke(); fill(14, 14, 16, 16); rect(0, 0, W, H);     // fade for trails
          stroke(232, 197, 71, 90); strokeWeight(1.4);
          for (const p of particles) {
            const a = noise(p.x * noiseScale, p.y * noiseScale, frameCount * 0.002) * TWO_PI * 2;
            const nx = p.x + Math.cos(a) * 1.6, ny = p.y + Math.sin(a) * 1.6;
            line(p.x, p.y, nx, ny);
            p.x = nx; p.y = ny;
            if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) { p.x = Math.random() * W; p.y = Math.random() * H; }
          }
        }
        function windowResized() { W = stage().clientWidth; H = stage().clientHeight; resizeCanvas(W, H); background(14); }
      </script>
    </main>
  </body>
</html>
