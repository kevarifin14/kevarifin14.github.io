<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDP Gridworld — Kevin Arifin</title>
    <link rel="stylesheet" href="../lib/sim.css" />
  </head>
  <body>
    <main class="sim">
      <a class="back" href="/sims/">← Sims</a>
      <h1>MDP Gridworld</h1>
      <p class="sub">Rewards diffuse backward through a stochastic grid as value iteration improves the policy. Paint walls or rewards, then step the Bellman update. <strong>Canvas 2D</strong> · AI.</p>

      <div class="stage" aria-label="Markov decision process gridworld values and policy arrows"><canvas id="c"></canvas></div>
      <div class="controls">
        <label class="row"><span>Discount <strong id="gammaValue"></strong></span>
          <input id="gamma" type="range" min="0.1" max="0.99" step="0.01" value="0.86" /></label>
        <label class="row"><span>Slip <strong id="slipValue"></strong></span>
          <input id="slip" type="range" min="0" max="0.45" step="0.01" value="0.18" /></label>
        <label class="row"><span>Paint</span>
          <select id="paint">
            <option value="wall">wall</option>
            <option value="plus">+1</option>
            <option value="minus">-1</option>
            <option value="empty">empty</option>
          </select></label>
        <button id="step">Step</button>
        <button id="run">Run 20</button>
        <button id="reset">Reset</button>
      </div>
      <div class="readout" id="ro" aria-live="polite"></div>

      <script src="../lib/simkit.js"></script>
      <script>
        const canvas = document.getElementById("c"), ctx = canvas.getContext("2d"), ro = document.getElementById("ro");
        const P = { gamma: 0.86, slip: 0.18 };
        const cols = 6, rows = 5, stepCost = -0.04;
        const dirs = [{ x: 0, y: -1, name: "N" }, { x: 1, y: 0, name: "E" }, { x: 0, y: 1, name: "S" }, { x: -1, y: 0, name: "W" }];
        let view = { w: 0, h: 0 }, cells = [], values = [], nextValues = [], policy = [], iter = 0;

        function idx(x, y) { return y * cols + x; }
        function resetWorld() {
          cells = Array.from({ length: cols * rows }, () => ({ type: "empty", reward: stepCost }));
          [[1,1],[1,2],[3,3]].forEach(([x, y]) => cells[idx(x, y)] = { type: "wall", reward: 0 });
          cells[idx(5, 0)] = { type: "terminal", reward: 1 };
          cells[idx(5, 1)] = { type: "terminal", reward: -1 };
          values = Array(cols * rows).fill(0);
          nextValues = Array(cols * rows).fill(0);
          policy = Array(cols * rows).fill(1);
          iter = 0;
          for (let i = 0; i < 8; i++) bellmanStep();
          draw();
        }
        function resize() { view = Sim.fitCanvas(canvas, ctx); draw(); }
        window.addEventListener("resize", resize);
        function legal(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows && cells[idx(x, y)].type !== "wall"; }
        function move(x, y, a) {
          const nx = x + dirs[a].x, ny = y + dirs[a].y;
          return legal(nx, ny) ? { x: nx, y: ny } : { x, y };
        }
        function qValue(x, y, a) {
          const probs = [[a, 1 - P.slip], [(a + 1) % 4, P.slip / 2], [(a + 3) % 4, P.slip / 2]];
          let q = 0;
          for (const [dir, prob] of probs) {
            const n = move(x, y, dir);
            const c = cells[idx(n.x, n.y)];
            const reward = c.type === "terminal" ? c.reward : stepCost;
            q += prob * (reward + P.gamma * values[idx(n.x, n.y)]);
          }
          return q;
        }
        function bellmanStep() {
          let delta = 0;
          for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
            const i = idx(x, y), c = cells[i];
            if (c.type === "wall") { nextValues[i] = 0; policy[i] = -1; continue; }
            if (c.type === "terminal") { nextValues[i] = c.reward; policy[i] = -1; continue; }
            let best = -Infinity, bestA = 0;
            for (let a = 0; a < 4; a++) {
              const q = qValue(x, y, a);
              if (q > best) { best = q; bestA = a; }
            }
            nextValues[i] = best; policy[i] = bestA; delta = Math.max(delta, Math.abs(best - values[i]));
          }
          [values, nextValues] = [nextValues, values];
          iter++;
          return delta;
        }
        function cellAt(p) {
          const size = Math.min((view.w - 28) / cols, (view.h - 28) / rows);
          const ox = (view.w - size * cols) / 2, oy = (view.h - size * rows) / 2;
          return { x: Math.floor((p.x - ox) / size), y: Math.floor((p.y - oy) / size), size, ox, oy };
        }
        function paintCell(x, y) {
          if (x < 0 || x >= cols || y < 0 || y >= rows) return;
          const mode = document.getElementById("paint").value;
          const i = idx(x, y);
          if (mode === "wall") cells[i] = { type: "wall", reward: 0 };
          else if (mode === "plus") cells[i] = { type: "terminal", reward: 1 };
          else if (mode === "minus") cells[i] = { type: "terminal", reward: -1 };
          else cells[i] = { type: "empty", reward: stepCost };
          values.fill(0); iter = 0;
          for (let k = 0; k < 8; k++) bellmanStep();
          draw();
        }
        function drawArrow(cx, cy, size, a) {
          if (a < 0) return;
          ctx.save();
          ctx.translate(cx, cy); ctx.rotate(a * Math.PI / 2);
          ctx.strokeStyle = "#e8c547"; ctx.fillStyle = "#e8c547"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(0, size * 0.22); ctx.lineTo(0, -size * 0.22); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, -size * 0.28); ctx.lineTo(-size * 0.09, -size * 0.12); ctx.lineTo(size * 0.09, -size * 0.12); ctx.closePath(); ctx.fill();
          ctx.restore();
        }
        function draw() {
          if (!view.w || !cells.length) return;
          ctx.fillStyle = "#0e0e10"; ctx.fillRect(0, 0, view.w, view.h);
          const size = Math.min((view.w - 28) / cols, (view.h - 28) / rows);
          const ox = (view.w - size * cols) / 2, oy = (view.h - size * rows) / 2;
          for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
            const i = idx(x, y), c = cells[i], v = values[i];
            const px = ox + x * size, py = oy + y * size;
            if (c.type === "wall") ctx.fillStyle = "#232326";
            else if (c.type === "terminal") ctx.fillStyle = c.reward > 0 ? "rgba(80,200,120,0.35)" : "rgba(220,80,80,0.35)";
            else ctx.fillStyle = v >= 0 ? "rgba(79,163,255," + (0.08 + Math.min(0.45, v * 0.28)) + ")" : "rgba(232,197,71," + (0.08 + Math.min(0.45, -v * 0.28)) + ")";
            ctx.fillRect(px, py, size - 2, size - 2);
            ctx.strokeStyle = "#232326"; ctx.strokeRect(px, py, size - 2, size - 2);
            ctx.fillStyle = "#ededed"; ctx.font = "12px ui-monospace, monospace"; ctx.textAlign = "center";
            ctx.fillText(c.type === "terminal" ? c.reward.toFixed(0) : v.toFixed(2), px + size / 2, py + size * 0.34);
            if (c.type === "empty") drawArrow(px + size / 2, py + size * 0.64, size, policy[i]);
          }
          ctx.textAlign = "left";
          ro.innerHTML = "Iteration <strong>" + iter + "</strong> · values propagate from rewards; slip makes the safe route more attractive.";
        }

        resetWorld(); resize();
        Sim.bind("gamma", P, "gamma", (v) => { draw(); return (+v).toFixed(2); });
        Sim.bind("slip", P, "slip", (v) => { draw(); return (+v).toFixed(2); });
        Sim.pointer(canvas, { down(p) { const c = cellAt(p); paintCell(c.x, c.y); } });
        document.getElementById("step").addEventListener("click", () => { bellmanStep(); draw(); });
        document.getElementById("run").addEventListener("click", () => { for (let i = 0; i < 20; i++) bellmanStep(); draw(); });
        document.getElementById("reset").addEventListener("click", resetWorld);
      </script>
    </main>
  </body>
</html>
