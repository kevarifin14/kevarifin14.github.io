<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Neural Boundary - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="neural-boundary"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Neural Boundary</h1>
    <p class="sub">A tiny two-hidden-unit network bends a decision field. Change the bend and regularization, then click to add samples. <strong>Canvas 2D</strong> · machine learning.</p>
    <div class="stage" aria-label="Neural network decision boundary field with labeled points"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Hidden bend</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Regularization</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="0.6" /></label><button id="step">Step</button><button id="shuffle">Randomize</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
