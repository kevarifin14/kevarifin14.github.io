<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Robot Arm IK - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="robot-arm-ik"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Robot Arm IK</h1>
    <p class="sub">A two-link arm solves the joint angles needed to reach a target. Drag the target and flip the elbow branch. <strong>Canvas 2D</strong> · robotics.</p>
    <div class="stage" aria-label="Two link robot arm inverse kinematics target"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Link ratio</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Elbow</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="0.8" /></label><button id="step">Move target</button><button id="shuffle">Home</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
