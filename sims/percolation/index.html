<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Percolation Threshold - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="percolation"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Percolation Threshold</h1>
    <p class="sub">Open random sites in a grid and watch when a connected path suddenly spans top to bottom. Drag to open extra sites. <strong>Canvas 2D</strong> · probability.</p>
    <div class="stage" aria-label="Percolation grid showing open cells and connected wet cluster"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Open probability</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Brush</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="1.0" /></label><button id="step">Step</button><button id="shuffle">Randomize</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
