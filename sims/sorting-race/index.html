<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Sorting Race - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="sorting-race"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Sorting Race</h1>
    <p class="sub">Watch three sorting algorithms work on the same shuffled list. The bars make comparisons, swaps, and partial order visible. <strong>Canvas 2D</strong> · algorithms.</p>
    <div class="stage" aria-label="Sorting algorithms racing on bar arrays"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Items</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Disorder</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="1.2" /></label><button id="step">Step</button><button id="shuffle">Shuffle</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
