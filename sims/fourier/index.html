<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fourier Epicycles — Kevin Arifin</title>
    <link rel="stylesheet" href="../lib/sim.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  </head>
  <body>
    <main class="sim">
      <a class="back" href="/sims/">← Sims</a>
      <h1>Fourier Epicycles</h1>
      <p class="sub">A stack of rotating circles sums into a square wave. Add terms and watch the approximation sharpen. <strong>Canvas 2D</strong> · math.</p>

      <div class="stage"><canvas id="c"></canvas></div>
      <div class="controls">
        <div class="row"><span>Terms <strong id="termsValue"></strong></span>
          <input id="terms" type="range" min="1" max="40" step="1" value="5" /></div>
        <div class="row"><span>Speed <strong id="spdValue"></strong></span>
          <input id="spd" type="range" min="0" max="2" step="0.01" value="1" /></div>
        <button id="toggle">Pause</button>
      </div>
      <div class="readout" id="formula"></div>

      <script src="../lib/simkit.js"></script>
      <script>
        const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
        const params = { terms: 5, spd: 1 };
        let view = { w: 0, h: 0 }, t = 0, wave = [];

        function resize() { view = Sim.fitCanvas(canvas, ctx); wave = []; }
        window.addEventListener("resize", resize);

        function update(dt) { t += params.spd * dt; }
        function render() {
          ctx.fillStyle = "#0e0e10"; ctx.fillRect(0, 0, view.w, view.h);
          const cy = view.h / 2, ox = view.w * 0.30, amp = view.h * 0.16;
          let x = ox, y = cy;
          for (let n = 0; n < params.terms; n++) {
            const k = 2 * n + 1, r = amp * (4 / (Math.PI * k)), px = x, py = y;
            ctx.strokeStyle = "rgba(255,255,255,0.16)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.stroke();
            x += r * Math.cos(k * t); y += r * Math.sin(k * t);
            ctx.strokeStyle = "rgba(232,197,71,0.45)";
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();
          }
          ctx.fillStyle = "#e8c547"; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();

          const waveX = view.w * 0.52, maxLen = Math.max(2, Math.floor(view.w - waveX));
          wave.unshift(y); if (wave.length > maxLen) wave.pop();
          ctx.strokeStyle = "#4fa3ff"; ctx.lineWidth = 2; ctx.beginPath();
          for (let i = 0; i < wave.length; i++) { const xx = waveX + i; i ? ctx.lineTo(xx, wave[i]) : ctx.moveTo(xx, wave[i]); }
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(waveX, wave[0]); ctx.stroke();
        }

        function formula() {
          const el = document.getElementById("formula");
          if (typeof katex === "undefined") { setTimeout(formula, 120); return; }
          katex.render("f(t)=\\frac{4}{\\pi}\\sum_{k=1,3,5,\\dots}^{" + params.terms + "\\,\\text{terms}}\\frac{\\sin(kt)}{k}", el, { throwOnError: false });
        }

        resize();
        Sim.bind("terms", params, "terms", (v) => { formula(); return v; });
        Sim.bind("spd", params, "spd", (v) => (+v).toFixed(2));
        const sim = Sim.loop({ update, render, stage: canvas.parentElement });
        document.getElementById("toggle").addEventListener("click", function () { sim.toggle(); this.textContent = sim.running ? "Pause" : "Play"; });
        formula();
      </script>
    </main>
  </body>
</html>
