<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A* Pathfinding - Kevin Arifin</title>
    <link rel="stylesheet" href="../lib/sim.css" />
  </head>
  <body>
    <main class="sim">
      <a class="back" href="/sims/">&larr; Sims</a>
      <h1>A* Pathfinding</h1>
      <p class="sub">A priority queue expands the cheapest-looking frontier first: cost so far plus a heuristic guess to the goal. Drag to edit terrain and watch the search change. <strong>Canvas 2D</strong> · graph algorithms.</p>

      <div class="stage" aria-label="A star pathfinding grid showing frontier, explored cells, walls, terrain, and shortest path"><canvas id="c"></canvas></div>
      <div class="controls">
        <label class="row"><span>Heuristic <strong id="heuristicValue"></strong></span>
          <input id="heuristic" type="range" min="0" max="2.2" step="0.05" value="1" /></label>
        <label class="row"><span>Terrain cost <strong id="terrainCostValue"></strong></span>
          <input id="terrainCost" type="range" min="1.5" max="8" step="0.1" value="4.0" /></label>
        <label class="row"><span>Paint</span>
          <select id="paint">
            <option value="wall">wall</option>
            <option value="terrain">terrain</option>
            <option value="empty">empty</option>
          </select></label>
        <button id="step">Step</button>
        <button id="toggle">Run</button>
        <button id="reset">Reset</button>
      </div>
      <div class="readout" id="ro" aria-live="polite"></div>

      <script src="../lib/simkit.js"></script>
      <script>
        const canvas = document.getElementById("c"), ctx = canvas.getContext("2d"), ro = document.getElementById("ro");
        const params = { heuristic: 1, terrainCost: 4 };
        const cols = 28, rows = 18, start = { x: 2, y: 9 }, goal = { x: 25, y: 8 };
        let view = { w: 0, h: 0 }, cells = [], open = [], closed = [], came = [], g = [], f = [], path = [], done = false, found = false, steps = 0, sim;

        function idx(x, y) { return y * cols + x; }
        function inside(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }
        function resize() { view = Sim.fitCanvas(canvas, ctx); sim && sim.renderOnce(); }
        window.addEventListener("resize", resize);

        function resetGrid() {
          const rnd = Sim.rng(41);
          cells = Array.from({ length: cols * rows }, () => ({ wall: false, terrain: false }));
          for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
            const i = idx(x, y);
            const corridor = Math.abs(y - (9 + Math.sin(x * 0.42) * 3)) < 2.2;
            cells[i].wall = !corridor && rnd() < 0.23;
            cells[i].terrain = !cells[i].wall && rnd() < 0.16;
          }
          for (let x = 1; x < cols - 1; x++) {
            const y = Math.round(9 + Math.sin(x * 0.42) * 3);
            for (let dy = -1; dy <= 1; dy++) if (inside(x, y + dy)) cells[idx(x, y + dy)] = { wall: false, terrain: false };
          }
          cells[idx(start.x, start.y)] = { wall: false, terrain: false };
          cells[idx(goal.x, goal.y)] = { wall: false, terrain: false };
          resetSearch();
          for (let i = 0; i < 45 && !done; i++) stepSearch();
          sim && sim.renderOnce();
        }

        function heuristic(x, y) {
          return params.heuristic * (Math.abs(goal.x - x) + Math.abs(goal.y - y));
        }
        function resetSearch() {
          const n = cols * rows;
          open = [idx(start.x, start.y)];
          closed = Array(n).fill(false);
          came = Array(n).fill(-1);
          g = Array(n).fill(Infinity);
          f = Array(n).fill(Infinity);
          path = [];
          done = false; found = false; steps = 0;
          const s = idx(start.x, start.y);
          g[s] = 0; f[s] = heuristic(start.x, start.y);
        }
        function reconstruct(i) {
          path = [];
          while (i >= 0) { path.push(i); i = came[i]; }
          path.reverse();
        }
        function stepSearch() {
          if (done || !open.length) { done = true; return; }
          let bestAt = 0;
          for (let i = 1; i < open.length; i++) if (f[open[i]] < f[open[bestAt]]) bestAt = i;
          const current = open.splice(bestAt, 1)[0];
          if (closed[current]) return;
          closed[current] = true; steps++;
          const cx = current % cols, cy = Math.floor(current / cols);
          if (cx === goal.x && cy === goal.y) { done = true; found = true; reconstruct(current); return; }
          const ns = [[1,0],[-1,0],[0,1],[0,-1]];
          for (const [dx, dy] of ns) {
            const nx = cx + dx, ny = cy + dy;
            if (!inside(nx, ny)) continue;
            const ni = idx(nx, ny), c = cells[ni];
            if (c.wall || closed[ni]) continue;
            const moveCost = c.terrain ? params.terrainCost : 1;
            const tentative = g[current] + moveCost;
            if (tentative < g[ni]) {
              came[ni] = current;
              g[ni] = tentative;
              f[ni] = tentative + heuristic(nx, ny);
              if (!open.includes(ni)) open.push(ni);
            }
          }
          if (came[idx(goal.x, goal.y)] >= 0) reconstruct(idx(goal.x, goal.y));
        }
        function update() {
          if (!sim || !sim.running) return;
          for (let i = 0; i < 6 && !done; i++) stepSearch();
          if (done && sim.running) {
            sim.pause();
            document.getElementById("toggle").textContent = "Run";
          }
        }
        function cellAt(p) {
          const size = Math.min((view.w - 28) / cols, (view.h - 28) / rows);
          const ox = (view.w - size * cols) / 2, oy = (view.h - size * rows) / 2;
          return { x: Math.floor((p.x - ox) / size), y: Math.floor((p.y - oy) / size) };
        }
        function paintCell(p) {
          const c = cellAt(p);
          if (!inside(c.x, c.y)) return;
          if ((c.x === start.x && c.y === start.y) || (c.x === goal.x && c.y === goal.y)) return;
          const mode = document.getElementById("paint").value;
          cells[idx(c.x, c.y)] = { wall: mode === "wall", terrain: mode === "terrain" };
          resetSearch();
          for (let i = 0; i < 30 && !done; i++) stepSearch();
          sim.renderOnce();
        }
        function render() {
          ctx.fillStyle = "#0e0e10"; ctx.fillRect(0, 0, view.w, view.h);
          const size = Math.min((view.w - 28) / cols, (view.h - 28) / rows);
          const ox = (view.w - size * cols) / 2, oy = (view.h - size * rows) / 2;
          const openSet = new Set(open), pathSet = new Set(path);
          for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
            const i = idx(x, y), c = cells[i], px = ox + x * size, py = oy + y * size;
            if (c.wall) ctx.fillStyle = "#232326";
            else if (pathSet.has(i)) ctx.fillStyle = "#e8c547";
            else if (x === start.x && y === start.y) ctx.fillStyle = "#50c878";
            else if (x === goal.x && y === goal.y) ctx.fillStyle = "#ff6a3d";
            else if (closed[i]) ctx.fillStyle = "rgba(79,163,255,0.45)";
            else if (openSet.has(i)) ctx.fillStyle = "rgba(232,197,71,0.34)";
            else if (c.terrain) ctx.fillStyle = "rgba(130,105,72,0.72)";
            else ctx.fillStyle = "rgba(255,255,255,0.05)";
            ctx.fillRect(px, py, size - 1.5, size - 1.5);
          }
          ctx.fillStyle = "#ededed";
          ctx.font = "12px ui-monospace, monospace";
          ctx.fillText("start", ox + start.x * size - 4, oy + start.y * size - 5);
          ctx.fillText("goal", ox + goal.x * size - 4, oy + goal.y * size - 5);
          const status = found ? "found" : done ? "blocked" : "searching";
          const cost = found ? g[idx(goal.x, goal.y)].toFixed(1) : "-";
          ro.innerHTML = "status <strong>" + status + "</strong> · expanded <strong>" + steps + "</strong> · path cost <strong>" + cost + "</strong> · frontier <strong>" + open.length + "</strong>";
        }

        resize();
        resetGrid();
        sim = Sim.loop({ update, render, stage: canvas.parentElement, autoplay: false });
        Sim.bind("heuristic", params, "heuristic", (v) => { resetSearch(); for (let i = 0; i < 45 && !done; i++) stepSearch(); sim.renderOnce(); return (+v).toFixed(2); });
        Sim.bind("terrainCost", params, "terrainCost", (v) => { resetSearch(); for (let i = 0; i < 45 && !done; i++) stepSearch(); sim.renderOnce(); return (+v).toFixed(1); });
        Sim.pointer(canvas, { down: paintCell, move(p) { if (p.down) paintCell(p); } });
        document.getElementById("step").addEventListener("click", () => { stepSearch(); sim.renderOnce(); });
        document.getElementById("toggle").addEventListener("click", function () { sim.toggle(); this.textContent = sim.running ? "Pause" : "Run"; });
        document.getElementById("reset").addEventListener("click", resetGrid);
      </script>
    </main>
  </body>
</html>
