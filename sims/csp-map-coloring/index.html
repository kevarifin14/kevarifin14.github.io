<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>CSP Map Coloring - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="csp-map-coloring"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>CSP Map Coloring</h1>
    <p class="sub">Backtracking searches for a coloring where neighboring regions disagree. Step through assignments and watch conflicts disappear. <strong>Canvas 2D</strong> · AI search.</p>
    <div class="stage" aria-label="Constraint satisfaction map coloring graph with conflicts"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Colors</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Steps</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="0.7" /></label><button id="step">Step</button><button id="shuffle">Restart</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
