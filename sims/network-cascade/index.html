<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Network Cascade - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="network-cascade"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Network Cascade</h1>
    <p class="sub">Nodes adopt when enough neighbors have adopted. Seed the graph and vary the threshold to see cascades stall or spread. <strong>Canvas 2D</strong> · networks.</p>
    <div class="stage" aria-label="Threshold adoption network cascade graph"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Threshold</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Connectivity</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="0.7" /></label><button id="step">Spread</button><button id="shuffle">New graph</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
