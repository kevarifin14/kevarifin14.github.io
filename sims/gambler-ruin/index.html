<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Gambler's Ruin - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="gambler-ruin"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Gambler's Ruin</h1>
    <p class="sub">Random walks between ruin and a target fortune show how a small edge changes long-run survival. <strong>Canvas 2D</strong> · stochastic processes.</p>
    <div class="stage" aria-label="Gambler's ruin random walk paths between absorbing boundaries"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Win probability</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Goal wealth</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="1.4" /></label><button id="step">Step</button><button id="shuffle">New walks</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
