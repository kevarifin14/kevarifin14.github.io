<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Heat Equation - Kevin Arifin</title><link rel="stylesheet" href="../lib/sim.css" /></head>
  <body data-sim="heat-equation"><main class="sim">
    <a class="back" href="/sims/">&larr; Sims</a><h1>Heat Equation</h1>
    <p class="sub">A hot spike smooths out because diffusion moves heat down local gradients. Drag the stage to inject heat. <strong>Canvas 2D</strong> · differential equations.</p>
    <div class="stage" aria-label="One dimensional heat equation diffusion curve"><canvas id="c"></canvas></div>
    <div class="controls"><label class="row"><span id="paramALabel">Diffusivity</span> <strong id="paramAValue"></strong><input id="paramA" type="range" /></label><label class="row"><span id="paramBLabel">Brush heat</span> <strong id="paramBValue"></strong><input id="paramB" type="range" /></label><label class="row"><span>Speed <strong id="speedValue"></strong></span><input id="speed" type="range" min="0.2" max="3" step="0.1" value="1.8" /></label><button id="step">Step</button><button id="shuffle">Reset field</button><button id="toggle">Pause</button><button id="reset">Reset</button></div>
    <div class="readout" id="ro" aria-live="polite"></div><script src="../lib/simkit.js"></script><script src="../lib/mini-labs.js"></script>
  </main></body>
</html>
