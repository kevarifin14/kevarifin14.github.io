<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schelling Model - Kevin Arifin</title>
    <link rel="stylesheet" href="../lib/sim.css" />
  </head>
  <body>
    <main class="sim">
      <a class="back" href="/sims/">&larr; Sims</a>
      <h1>Schelling Model</h1>
      <p class="sub">Tiny local preferences can create strong global clustering. Lower the tolerance, reset, and compare the final pattern to the rule each agent follows. <strong>Canvas 2D</strong> · agent-based systems.</p>

      <div class="stage" aria-label="Schelling segregation model grid with two agent groups and empty homes"><canvas id="c"></canvas></div>
      <div class="controls">
        <label class="row"><span>Tolerance <strong id="toleranceValue"></strong></span>
          <input id="tolerance" type="range" min="0.15" max="0.85" step="0.01" value="0.42" /></label>
        <label class="row"><span>Vacancy <strong id="vacancyValue"></strong></span>
          <input id="vacancy" type="range" min="0.06" max="0.36" step="0.01" value="0.18" /></label>
        <label class="row"><span>Speed <strong id="speedValue"></strong></span>
          <input id="speed" type="range" min="0.2" max="3.0" step="0.1" value="1.3" /></label>
        <button id="toggle">Pause</button>
        <button id="step">Step</button>
        <button id="reset">Reset</button>
      </div>
      <div class="readout" id="ro" aria-live="polite"></div>

      <script src="../lib/simkit.js"></script>
      <script>
        const canvas = document.getElementById("c"), ctx = canvas.getContext("2d"), ro = document.getElementById("ro");
        const params = { tolerance: 0.42, vacancy: 0.18, speed: 1.3 };
        const cols = 44, rows = 28;
        let view = { w: 0, h: 0 }, rng = Sim.rng(312), grid = [], empties = [], moves = 0, sim;

        function idx(x, y) { return y * cols + x; }
        function inside(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }
        function resize() { view = Sim.fitCanvas(canvas, ctx); sim && sim.renderOnce(); }
        window.addEventListener("resize", resize);
        function reset() {
          rng = Sim.rng(312);
          grid = Array(cols * rows).fill(0);
          empties = [];
          for (let i = 0; i < grid.length; i++) {
            if (rng() < params.vacancy) { grid[i] = 0; empties.push(i); }
            else grid[i] = rng() < 0.5 ? 1 : 2;
          }
          moves = 0;
          for (let i = 0; i < 35; i++) stepModel(Math.round(params.speed * 8));
          sim && sim.renderOnce();
        }
        function neighbors(i) {
          const x = i % cols, y = Math.floor(i / cols), out = [];
          for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
            if (!dx && !dy) continue;
            const nx = x + dx, ny = y + dy;
            if (inside(nx, ny) && grid[idx(nx, ny)] !== 0) out.push(grid[idx(nx, ny)]);
          }
          return out;
        }
        function isHappy(i) {
          const group = grid[i];
          if (!group) return true;
          const ns = neighbors(i);
          if (!ns.length) return true;
          const same = ns.filter((g) => g === group).length / ns.length;
          return same >= params.tolerance;
        }
        function stepModel(limit) {
          if (!empties.length) return 0;
          const unhappy = [];
          for (let i = 0; i < grid.length; i++) if (grid[i] && !isHappy(i)) unhappy.push(i);
          if (!unhappy.length) return 0;
          let did = 0;
          for (let n = 0; n < limit && unhappy.length && empties.length; n++) {
            const fromAt = Math.floor(rng() * unhappy.length);
            const from = unhappy.splice(fromAt, 1)[0];
            if (!grid[from] || isHappy(from)) continue;
            const toAt = Math.floor(rng() * empties.length);
            const to = empties[toAt];
            grid[to] = grid[from]; grid[from] = 0;
            empties[toAt] = from;
            moves++; did++;
          }
          return did;
        }
        function update() {
          stepModel(Math.max(1, Math.round(params.speed * 10)));
        }
        function metrics() {
          let occupied = 0, unhappy = 0, sameSum = 0, sameCount = 0;
          for (let i = 0; i < grid.length; i++) {
            if (!grid[i]) continue;
            occupied++;
            if (!isHappy(i)) unhappy++;
            const ns = neighbors(i);
            if (ns.length) {
              sameSum += ns.filter((g) => g === grid[i]).length / ns.length;
              sameCount++;
            }
          }
          return {
            unhappy: occupied ? unhappy / occupied : 0,
            similarity: sameCount ? sameSum / sameCount : 0,
          };
        }
        function render() {
          if (!grid.length) return;
          ctx.fillStyle = "#0e0e10"; ctx.fillRect(0, 0, view.w, view.h);
          const size = Math.min((view.w - 28) / cols, (view.h - 48) / rows);
          const ox = (view.w - size * cols) / 2, oy = 18;
          for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
            const g = grid[idx(x, y)], px = ox + x * size, py = oy + y * size;
            if (g === 1) ctx.fillStyle = "#4fa3ff";
            else if (g === 2) ctx.fillStyle = "#e8c547";
            else ctx.fillStyle = "rgba(255,255,255,0.055)";
            ctx.fillRect(px, py, size - 1, size - 1);
          }
          const m = metrics();
          const barX = 42, barY = view.h - 28, barW = view.w - 84;
          ctx.fillStyle = "#232326"; ctx.fillRect(barX, barY, barW, 8);
          ctx.fillStyle = "#e8c547"; ctx.fillRect(barX, barY, barW * m.similarity, 8);
          ctx.fillStyle = "#ededed"; ctx.font = "12px ui-monospace, monospace";
          ctx.fillText("same-neighbor share", barX, barY - 8);
          ro.innerHTML = "moves <strong>" + moves + "</strong> · unhappy agents <strong>" + (m.unhappy * 100).toFixed(1) + "%</strong> · same-neighbor share <strong>" + (m.similarity * 100).toFixed(1) + "%</strong>";
        }
        function cycleCell(p) {
          const size = Math.min((view.w - 28) / cols, (view.h - 48) / rows);
          const ox = (view.w - size * cols) / 2, oy = 18;
          const x = Math.floor((p.x - ox) / size), y = Math.floor((p.y - oy) / size);
          if (!inside(x, y)) return;
          const i = idx(x, y), old = grid[i];
          grid[i] = (old + 1) % 3;
          empties = grid.map((g, k) => g ? -1 : k).filter((k) => k >= 0);
          sim.renderOnce();
        }

        resize();
        reset();
        sim = Sim.loop({ update, render, stage: canvas.parentElement });
        Sim.bind("tolerance", params, "tolerance", (v) => (+v * 100).toFixed(0) + "%");
        Sim.bind("vacancy", params, "vacancy", (v) => { reset(); return (+v * 100).toFixed(0) + "%"; });
        Sim.bind("speed", params, "speed", (v) => (+v).toFixed(1));
        Sim.pointer(canvas, { down: cycleCell });
        document.getElementById("toggle").addEventListener("click", function () { sim.toggle(); this.textContent = sim.running ? "Pause" : "Play"; });
        document.getElementById("step").addEventListener("click", () => { stepModel(40); sim.renderOnce(); });
        document.getElementById("reset").addEventListener("click", reset);
      </script>
    </main>
  </body>
</html>
